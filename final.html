<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dreamy Dashboard</title>
    <style>
        body {
            background-color: #f5f5f0; /* Soft beige */
            color: #333;
            font-family: 'Arial', sans-serif;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            background-color: white;
        }
        h1 {
            color: #ff7f50; /* Coral */
        }
        .card {
            background-color: #fff1e6;
            border: 1px solid #ffe4d4;
            border-radius: 8px;
            margin: 15px 0;
            padding: 15px;
            transition: transform 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .roadmap {
            display: flex;
            flex-direction: column;
            margin-top: 20px;
        }
        .step {
            background-color: #e6ffe6; /* Light green */
            border: 2px solid #c2f0c2;
            border-radius: 8px;
            padding: 10px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to Your Dreamy Dashboard!</h1>
        <div class="card">
            <h2>Your Goals</h2>
            <p>Reflect on your dreams and aspirations.</p>
        </div>
        <div class="card">
            <h2>Current Mood</h2>
            <p>How are you feeling today?</p>
        </div>
        <div class="roadmap">
            <h2>Visual Roadmap</h2>
            <div class="step">Step 1: Define Your Goals</div>
            <div class="step">Step 2: Break Them Down into Tasks</div>
            <div class="step">Step 3: Take Action</div>
            <div class="step">Step 4: Reflect on Progress</div>
        </div>
    </div>
</body>
</html>
