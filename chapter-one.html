<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Chapter One</title>\n    <style>\n        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }\n        .dark-mode { background-color: #121212; color: #ffffff; }\n        .hidden { display: none; }\n        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.5); z-index: 1000; }\n        .modal-backdrop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); z-index: 999; }\n    </style>\n</head>\n<body>\n    <header>\n        <h1>My Journal</h1>\n        <button id="darkModeToggle">Toggle Dark Mode</button>\n        <button id="modalOpen">Open Modal</button>\n    </header>\n    <main>\n        <h2>Chapter One</h2>\n        <p>This is the first chapter. It explores various themes and ideas.</p>\n        <p id="readingTime">Reading time: <span id="time">1 minute</span></p>\n    </main>\n    <div class="modal hidden" id="modal">\n        <div class="modal-backdrop" id="backdrop"></div>\n        <div class="modal-content">\n            <h3>Modal Title</h3>\n            <p>This is a modal dialog.</p>\n            <button id="modalClose">Close</button>\n        </div>\n    </div>\n    <script>\n        // JSON Data\n        const data = {\n            "chapter": "Chapter One",\n            "theme": "Exploration of themes and ideas.",\n            "content": [\n                "First paragraph of the chapter.",\n                "Second paragraph discussing deeper meanings."\n            ]\n        };\n        \n        // Dark mode toggle\n        const darkModeToggle = document.getElementById('darkModeToggle');\n        const body = document.body;\n        darkModeToggle.addEventListener('click', () => {\n            body.classList.toggle('dark-mode');\n        });\n        \n        // Modal functionality\n        const modal = document.getElementById('modal');\n        const modalOpen = document.getElementById('modalOpen');\n        const modalClose = document.getElementById('modalClose');\n        const backdrop = document.getElementById('backdrop');\n        modalOpen.addEventListener('click', () => {\n            modal.classList.remove('hidden');\n        });\n        modalClose.addEventListener('click', () => {\n            modal.classList.add('hidden');\n        });\n        backdrop.addEventListener('click', () => {\n            modal.classList.add('hidden');\n        });\n        \n        // Keyboard shortcuts\n        document.addEventListener('keydown', (event) => {\n            if (event.key === 'Escape') {\n                modal.classList.add('hidden');\n            }\n        });\n        \n        // Reading time estimation\n        const words = data.content.join(' ').split(' ').length;\n        const readingTime = Math.ceil(words / 200); // average reading speed is 200 wpm\n        document.getElementById('time').textContent = readingTime + ' minute' + (readingTime > 1 ? 's' : '');\n    </script>\n</body>\n</html>
